name: EAS Build Production

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest
    env: # Set EXPO_TOKEN at the job level for all steps to access
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 22 # Changed from 18 to 22 (or higher) to meet dependency requirements
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Install EAS CLI
        run: npm install -g eas-cli

      # Removed the 'Login to Expo' step.
      # EAS CLI automatically authenticates using the EXPO_TOKEN environment variable set at the job level.

      - name: Build Android App (Production)
        run: eas build --platform android --profile production --clear-cache
        env:
          NODE_ENV: production # This environment variable is specific to this step
