# .github/workflows/auto-tag.yml
name: Auto Tag Latest Push

on:
  push:
    branches:
      - main # Set this to your primary development branch (e.g., 'master')

permissions:
  contents: write # This is crucial: it grants permission to create and push tags

jobs:
  auto-tag:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Important: Fetches all history, including tags

      - name: Get latest tag
        id: get_tag
        run: |
          # Get the latest tag, or default to v0.0.0 if no tags exist
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "Latest tag found: $LATEST_TAG"
          echo "latest_tag=$LATEST_TAG" >> $GITHUB_OUTPUT

      - name: Calculate new tag
        id: new_tag
        run: |
          LATEST_TAG="${{ steps.get_tag.outputs.latest_tag }}"
          # Extract version components (assuming format vX.Y.Z)
          # 'sed' removes the 'v', 'tr' splits by '.', 'awk' selects parts
          VERSION_PARTS=($(echo "$LATEST_TAG" | sed 's/^v//' | tr '.' ' '))
          MAJOR=${VERSION_PARTS[0]:-0} # Default to 0 if not set
          MINOR=${VERSION_PARTS[1]:-0} # Default to 0 if not set
          PATCH=${VERSION_PARTS[2]:-0} # Default to 0 if not set

          # Increment the patch version
          NEW_PATCH=$((PATCH + 1))
          NEW_TAG="v$MAJOR.$MINOR.$NEW_PATCH"

          echo "Calculated new tag: $NEW_TAG"
          echo "new_tag=$NEW_TAG" >> $GITHUB_OUTPUT

      - name: Create and push new tag
        run: |
          NEW_TAG="${{ steps.new_tag.outputs.new_tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$NEW_TAG"
          git push origin "$NEW_TAG"

          echo "Successfully created and pushed tag: $NEW_TAG"